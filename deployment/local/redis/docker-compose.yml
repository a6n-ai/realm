# Standalone local Redis (cache L2). Run alone for cache-only dev while the app
# runs on the host via `pnpm --filter tiffin-grab dev`:
#     docker compose -f deployment/local/redis/docker-compose.yml up
# Then set REDIS_URL=redis://127.0.0.1:6379 in apps/tiffin-grab/.env.local.
#
# This same definition is pulled into the umbrella stack via `include:`, where the
# app reaches it as redis://redis:6379 over the compose network.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Pure cache — evictable, no persistence. Mirrors the prod cap so local hit/miss
    # behaviour matches production.
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "127.0.0.1:6379:6379" # host-bound: reachable by a host-run app and redis-cli
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
