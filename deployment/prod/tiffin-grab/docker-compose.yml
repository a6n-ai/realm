# Production launch stack. `docker compose up -d` runs web + redis + caddy.
# Images are BUILT IN CI and pushed to GHCR; the box only pulls them (deploy.sh).
# Migrations run via the `migrate` profile (see deploy.sh), not on up.
#
# Two images from deployment/prod/Dockerfile:
#   tiffin-grab-web   = runner target (slim Next.js standalone) → web
#   tiffin-grab-tools = build  target (source + drizzle-kit + tsx) → worker, migrate
# Pin via IMAGE_TAG (CI sets it to the commit SHA); defaults to :latest.
#
# redis + pgbouncer service defs are reused from their per-service subfolders.
# Redis stays colocated per-app (isolated cache); RabbitMQ is the only shared
# box — the worker reaches it via RABBITMQ_URL in .env.production.
# Caddy is NO LONGER here — it's a standalone shared ingress in ../proxy that
# fronts every app. `web` joins the external `edge` network so the shared Caddy
# can reach it as `tiffin-grab-web:3000`.
include:
  - redis/docker-compose.yml
  - pgbouncer/docker-compose.yml

# Ships each container's stdout (pino JSON) to CloudWatch via the Docker awslogs
# driver — no CloudWatch agent. Requires the EC2 instance role to allow
# logs:CreateLogGroup/CreateLogStream/PutLogEvents. Every log line carries a
# `name` field, so one shared group is queryable per-service in Logs Insights;
# split into per-service groups later if retention/IAM needs diverge.
x-awslogs: &awslogs
  driver: awslogs
  options:
    # resolved by the compose CLI (not env_file:) — default keeps it working
    # regardless of how compose is invoked. deploy.sh sources .env.production, so
    # the AWS_REGION parameter normally wins; the default only applies if that
    # parameter goes missing. Both are us-east-1 — keep them in step.
    awslogs-region: ${AWS_REGION:-us-east-1}
    awslogs-group: /tiffin/prod
    awslogs-create-group: "true"

services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/a6n-ai/tiffin-grab-web}:${IMAGE_TAG:-latest}
    container_name: tiffin-grab-web # stable hostname the shared Caddy targets
    restart: unless-stopped
    logging: *awslogs
    env_file: .env.production
    environment:
      # Redis is a compose service, not localhost — override the seam default.
      REDIS_URL: redis://redis:6379
    expose:
      - "3000" # internal only; the shared Caddy is the sole public ingress
    networks:
      - default # reach redis/pgbouncer in this project
      - edge # reached by the shared Caddy in ../proxy
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy

  worker:
    image: ${TOOLS_IMAGE:-ghcr.io/a6n-ai/tiffin-grab-tools}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *awslogs
    env_file: .env.production
    command: ["pnpm", "--filter", "tiffin-grab", "exec", "tsx", "workers/notify-consumer.ts"]

  # One-shot migration runner. Reuses the tools image (has drizzle-kit + source).
  # Never starts on `up` (tools profile); invoked by deploy.sh before up.
  migrate:
    image: ${TOOLS_IMAGE:-ghcr.io/a6n-ai/tiffin-grab-tools}:${IMAGE_TAG:-latest}
    logging: *awslogs
    env_file: .env.production
    environment:
      # Migrations bypass the pooler — drizzle-kit DDL + advisory lock need a
      # real session on RDS.
      DATABASE_URL: ${DIRECT_DATABASE_URL}
    command: ["pnpm", "--filter", "tiffin-grab", "exec", "drizzle-kit", "migrate"]
    profiles:
      - tools

# Shared ingress network — created once on the box (`docker network create edge`)
# and joined by the standalone Caddy in ../proxy and every app's `web`.
networks:
  edge:
    external: true
