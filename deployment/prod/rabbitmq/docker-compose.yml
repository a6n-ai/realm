# LOCAL/DEV RabbitMQ broker (management UI on 15672). In PRODUCTION the broker
# runs on a dedicated t2.micro EC2 — set RABBITMQ_URL to that host and do NOT
# include this file in the prod umbrella. Kept here so `local` can include it.
services:
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "127.0.0.1:5672:5672"   # host-side debugging only
      - "127.0.0.1:15672:15672" # management UI — never expose publicly
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
