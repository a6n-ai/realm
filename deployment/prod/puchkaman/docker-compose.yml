# Puchkaman prod stack — public marketing site only (no DB, redis, worker or
# migrations yet). Just the Next.js standalone container, fronted by the shared
# Caddy in ../proxy which reaches it as `puchkaman-web:3000` over `edge`.
#
# Image is built in CI (deployment/prod/Dockerfile, --build-arg APP=puchkaman)
# and pushed to GHCR; the box only pulls it (deploy.sh).
#
# ponytail: no logging driver — Docker default (json-file). awslogs needs an
# env_file (AWS_REGION) + an IAM grant for /puchkaman/prod the tiffin role lacks;
# a public static site doesn't need CloudWatch. Add logs when a backend lands.
services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/a6n-ai/puchkaman-web}:${IMAGE_TAG:-latest}
    container_name: puchkaman-web # stable hostname the shared Caddy targets
    restart: unless-stopped
    # No env_file: the public site needs no runtime secrets today. Add one here
    # (and uncomment) when admin/DB/auth land.
    # env_file: .env.production
    expose:
      - "3000" # internal only; the shared Caddy is the sole public ingress
    networks:
      - edge

networks:
  edge:
    external: true
