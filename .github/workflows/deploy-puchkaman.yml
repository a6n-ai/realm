# Deploy puchkaman (Box B) on push to main. Self-contained: builds puchkaman-web
# (runner) + puchkaman-tools (build) → GHCR, then the box pulls + migrates +
# restarts. Triggered only when puchkaman or shared code changes (see paths);
# tiffin-grab has its own workflow (deploy-tiffin-grab.yml) targeting Box A — the
# two apps live on separate boxes and deploy fully independently.
#
# Required repo secrets: EC2_HOST_PUCHKAMAN (Box B), EC2_USER, EC2_SSH_KEY.
# Optional repo variable: DEPLOY_PATH (default ~/realm), ENABLE_SSH_DEPLOY.
name: deploy-puchkaman

on:
  push:
    branches: [main]
    paths:
      - "apps/puchkaman/**"
      - "packages/**"
      - "deployment/prod/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-puchkaman.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-puchkaman
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # web first: the runner target also builds the shared `build` stage, warming
      # the cache the tools image reuses.
      - name: Build + push puchkaman-web (runner)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployment/prod/Dockerfile
          target: runner
          build-args: |
            APP=puchkaman
          push: true
          tags: |
            ghcr.io/a6n-ai/puchkaman-web:${{ github.sha }}
            ghcr.io/a6n-ai/puchkaman-web:latest
          cache-from: type=gha,scope=puchkaman
          cache-to: type=gha,mode=max,scope=puchkaman

      - name: Build + push puchkaman-tools (build)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployment/prod/Dockerfile
          target: build
          build-args: |
            APP=puchkaman
          push: true
          tags: |
            ghcr.io/a6n-ai/puchkaman-tools:${{ github.sha }}
            ghcr.io/a6n-ai/puchkaman-tools:latest
          cache-from: type=gha,scope=puchkaman
          cache-to: type=gha,mode=max,scope=puchkaman

  deploy:
    needs: build
    if: ${{ vars.ENABLE_SSH_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: SSH → deploy puchkaman on Box B
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST_PUCHKAMAN }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            REPO="${{ vars.DEPLOY_PATH }}"; REPO="${REPO:-$HOME/realm}"
            git -C "$REPO" pull --ff-only
            cd "$REPO/deployment/prod/puchkaman"
            docker network inspect edge >/dev/null 2>&1 || docker network create edge
            (cd proxy && docker compose pull && docker compose up -d)
            ./deploy.sh
